name: Build and Push Analyzer Metrics Docker image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Record start time
        id: start-time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract git commit SHA
        id: vars
        run: echo "GIT_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            soportetroiatec/analyzer-metrics-tensorflow:latest
            soportetroiatec/analyzer-metrics-tensorflow:${{ env.GIT_COMMIT }}
          build-args: |
            APP_VERSION=${{ env.GIT_COMMIT }}

      - name: Checkout definitions repository
        uses: actions/checkout@v2
        with:
          repository: Neuronsinc/troiatec-k8-definitions.git
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: definitions
          ref: main

      - name: Update Kubernetes YAML
        run: |
          cd definitions/analyzer/k8s
          
          # Actualizamos la API y Workers de Staging usando el SHA del commit
          sed -i "s|image: .*/analyzer-metrics-tensorflow:.*|image: soportetroiatec/analyzer-metrics-tensorflow:${{ env.GIT_COMMIT }}|g" metrics/staging/analyzer-metrics-deployment.yml
          sed -i "s|image: .*/analyzer-metrics-tensorflow:.*|image: soportetroiatec
