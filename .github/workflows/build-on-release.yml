name: Update definition on metrics release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Record start time
        id: start-time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract git commit SHA
        id: vars
        run: echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            soportetroiatec/analyzer-metrics-tensorflow:latest
            soportetroiatec/analyzer-metrics-tensorflow:${{ env.TAG }}
          build-args: |
            APP_VERSION=${{ env.TAG }}

      - name: Checkout definitions repository
        uses: actions/checkout@v2
        with:
          repository: Neuronsinc/troiatec-k8-definitions.git
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: definitions
          ref: main

      - name: Update Kubernetes YAML
        run: |
          cd definitions/analyzer/k8s
          
          sed -i "s|image: .*/analyzer-metrics-tensorflow:.*|image: soportetroiatec/analyzer-metrics-tensorflow:${TAG}|g" metrics/production/analyzer-metrics-deployment.yml
          sed -i "s|image: .*/analyzer-metrics-tensorflow:.*|image: soportetroiatec/analyzer-metrics-tensorflow:${TAG}|g" metrics-celery/production/analyzer-caracteristics-celery-deployment.yml
          sed -i "s|image: .*/analyzer-metrics-tensorflow:.*|image: soportetroiatec/analyzer-metrics-tensorflow:${TAG}|g" metrics-celery/production/analyzer-feng-celery-deployment.yml
          sed -i "s|image: .*/analyzer-metrics-tensorflow:.*|image: soportetroiatec/analyzer-metrics-tensorflow:${TAG}|g" metrics-celery/production/analyzer-prediction-celery-deployment.yml
          sed -i "s|image: .*/analyzer-metrics-tensorflow:.*|image: soportetroiatec/analyzer-metrics-tensorflow:${TAG}|g" metrics-celery/production/analyzer-vids-celery-deployment.yml

          git config --global init.defaultBranch main
          git config --global user.name "github-actions-bot"
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git add .
          
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "chore: update production images to soportetroiatec/analyzer-metrics-tensorflow:${TAG}"
            git push origin main
          else
            echo "No se detectaron cambios en los archivos YAML. Saltando el commit y push."
          fi

      - name: Record end time
        id: end-time
        run: echo "END_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Calculate build duration
        id: duration
        run: |
          START_TIME=${{ env.START_TIME }}
          END_TIME=${{ env.END_TIME }}
          DURATION=$((END_TIME - START_TIME))
          echo "DURATION=$DURATION" >> $GITHUB_ENV

      - name: Send notification to Discord
        if: success()
        run: |
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          curl -H "Content-Type: application/json" -d '{
            "content": "🚀 **Despliegue de Producción finalizado correctamente.**\n**Imagen:** `soportetroiatec/analyzer-metrics-tensorflow:'"$TAG"'`\n**Duración:** '"$MINUTES"':'"$SECONDS"'"
          }' ${{ secrets.DISCORD_WEBHOOK_URL }}
